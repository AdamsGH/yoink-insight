commands:
  - {command: about,          description: "Описание YouTube видео",          scope: default}
  - {command: summary,        description: "Краткое содержание YouTube видео", scope: default}
  - {command: insight_lang,   description: "Язык ответов Insight",            scope: private}
  - {command: insight_grant,  description: "Выдать доступ к Insight",         scope: private, min_role: admin}
  - {command: insight_revoke, description: "Отозвать доступ к Insight",       scope: private, min_role: admin}
  - {command: insight_list,   description: "Список доступа к Insight",        scope: private, min_role: admin}

